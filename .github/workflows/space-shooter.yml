name: Generate Space Shooter

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Cria a pasta para garantir que o arquivo tenha um destino
      - name: Create dist directory
        run: mkdir -p dist

      - name: Generate Space Shooter GIF
        uses: czl9707/gh-space-shooter@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          strategy: random
          output-path: dist/gh-space-shooter.gif
          # AQUI ESTÁ A CHAVE: "skip" faz a action ignorar o commit interno
          commit-message: "skip"

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}