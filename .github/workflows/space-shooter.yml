name: Generate Space Shooter

on:
  # Executa automaticamente a cada 24 horas
  schedule:
    - cron: "0 0 * * *"
  
  # Permite que você rode manualmente para testar
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # Gera o GIF do jogo baseado nas suas contribuições
      - name: generate-gh-space-shooter-gif
        uses: czl9707/gh-space-shooter@v1.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Opções de estratégia: random, row, ou column
          strategy: random 

      # Pega o arquivo gerado e envia para uma branch chamada 'output'
      - name: push space-shooter-gif to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}